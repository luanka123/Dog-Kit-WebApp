stramento Base",questions:[{q:"Come insegno il comando 'Seduto'?",a:"Tieni un premietto vicino al naso del cane. Sposta la mano verso l'alto e leggermente indietro sopra la sua testa. Quando segue il premio con il naso, il suo sedere si abbasserà naturalmente. Appena si siede, dì 'Seduto', premialo e fagli le coccole."},{q:"Il mio cucciolo tira al guinzaglio, cosa faccio?",a:"Non appena il guinzaglio si tende, fermati immediatamente. Non tirare indietro, aspetta che il cane si giri verso di te o allenti la tensione. Quando lo fa, premialo e riprendi a camminare. La costanza è fondamentale: camminare deve essere un'attività collaborativa, non una gara di forza."},{q:"Come gestire il richiamo?",a:"Inizia in un ambiente senza distrazioni (come il corridoio di casa). Usa un tono allegro e un nome specifico per il richiamo (es. 'Vieni!'). Quando arriva, festeggia come se avesse vinto una medaglia d'oro. Mai sgridare un cane che torna da te, anche se ci ha messo molto tempo."}]},{category:"Comportamento & Socializzazione",questions:[{q:"Perché il mio cucciolo morde mani e vestiti?",a:"È il loro modo di esplorare il mondo e giocare. Se morde troppo forte, emetti un piccolo guaito ('Ahi!') e interrompi il gioco per 30 secondi. Offrigli immediatamente un gioco masticabile alternativo. Imparerà che mordere la pelle interrompe il divertimento, mentre mordere i giochi lo continua."},{q:"Come socializzare correttamente il cucciolo?",a:"Socializzare non significa far incontrare tutti i cani del quartiere. Significa esporre il cucciolo a nuovi suoni, superfici, persone e animali in modo positivo e controllato. Assicurati che ogni nuova esperienza sia associata a qualcosa di piacevole (premietti o lodi) e non forzarlo mai se ha paura."}]},{category:"Salute & Igiene",questions:[{q:"Ogni quanto devo lavare il mio cane?",a:"In genere, una volta ogni 1-3 mesi è sufficiente, a meno che non si rotoli nel fango. Lavaggi troppo frequenti possono rimuovere gli oli naturali della pelle. Usa sempre uno shampoo specifico per cani, poiché il loro pH è diverso dal nostro."},{q:"Come pulire le orecchie?",a:"Usa un batuffolo di cotone inumidito con un detergente auricolare specifico. Pulisci solo la parte visibile del padiglione auricolare. Non inserire mai cotton fioc nel condotto uditivo, potresti causare danni gravi."}]},{category:"Gestione Quotidiana",questions:[{q:"Quante volte al giorno deve mangiare un cucciolo?",a:"Fino ai 6 mesi, è consigliabile suddividere la razione giornaliera in 3 pasti. Dopo i 6 mesi, si può passare a 2 pasti (mattina e sera). Cerca di mantenere orari regolari per aiutare la digestione e l'educazione ai bisogni fuori casa."},{q:"Il cane abbaia quando resta solo, cosa fare?",a:"Inizia con assenze brevissime (pochi secondi) e aumenta gradualmente. Lasciagli un gioco interattivo (come un Kong ripieno) per tenerlo occupato. Non fare grandi cerimonie quando esci o quando rientri: la tua partenza deve essere percepita come un evento normale e non stressante."}]}];function KA(){const[i,l]=G.useState(()=>localStorage.getItem("dogkit_welcome_seen")?"home":"welcome"),[o,u]=G.useState(!1),[c,h]=G.useState(()=>{const V=localStorage.getItem("dogkit_routine");return V?JSON.parse(V):[{id:"1",label:"Colazione servita",time:"08:00",completed:!1,type:"morning"},{id:"2",label:"Passeggiata mattutina",time:"08:30",completed:!1,type:"morning"},{id:"3",label:"Acqua fresca",completed:!1,type:"morning"},{id:"4",label:"Cena servita",time:"19:00",completed:!1,type:"evening"},{id:"5",label:"Passeggiata serale",time:"19:30",completed:!1,type:"evening"},{id:"6",label:"Coccole e relax",completed:!1,type:"evening"}]}),[f,m]=G.useState(()=>{const V=localStorage.getItem("dogkit_training");return V?JSON.parse(V):XA}),[g,p]=G.useState(()=>{const V=localStorage.getItem("dogkit_shopping");return V?JSON.parse(V):[{id:"1",label:"Crocchette puppy",category:"Cibo",completed:!1},{id:"2",label:"Ciotola acqua",category:"Cibo",completed:!1},{id:"3",label:"Antiparassitari",
